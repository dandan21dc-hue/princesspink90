name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Nightly scan so newly-published Supabase advisories or drift caused
  # by dashboard-side changes surface even when nobody has pushed code.
  # 07:15 UTC picks an off-hour so the run doesn't collide with the
  # morning PR flurry, and cron.job_run_details from pg_cron won't be
  # rotating at the same instant.
  schedule:
    - cron: "15 7 * * *"
  # Manual re-run button on the Actions tab — handy after acknowledging
  # a finding or updating the baseline.
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: App / Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      # AUD is the sole surface currency for this project. This scanner
      # renders every email template and greps UI/JSON-LD sources for
      # "USD" / "US$", blocking a merge that would ship a non-AUD price
      # label in copy, JSON-LD, or an email body.
      - name: Scan UI + emails for USD strings
        run: bun run lint:usd

      # Static regression guard for three previously-fixed vulnerability
      # classes: open-redirect on payment/billing flows, `.select('*')`
      # on guest-exposed tables, and SECURITY DEFINER migrations without
      # a pinned search_path. Runs offline (no secrets, no network),
      # baselined via security/regression-baseline.json.
      - name: Security regression scan (source patterns)
        run: bun run lint:security-regression


  supabase_security_config_validate:
    name: Supabase / Config Validate
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Pre-flight schema + shape check for the security gate config.
      # Runs with NO secrets and NO network: it only inspects checked-in
      # files (security/lint-baseline.json, scripts/supabase-security-lint.mjs,
      # .github/workflows/ci.yml). Catches malformed baseline JSON, missing
      # rationale, unsorted findings, and any SUPABASE_LINT_ALLOWLIST entry
      # not present in APPROVED_ALLOWLIST — so those failures surface here
      # with a precise message instead of a confusing failure downstream in
      # the linter or gate job.
      - name: Validate security config
        id: validate
        run: |
          set -o pipefail
          mkdir -p /tmp/security-config
          bun run validate:security-config 2>&1 \
            | tee /tmp/security-config/validate.log

      # Cap any single file at 2 MiB (keep the tail — the failing
      # assertion is at the end) so a runaway log can't blow the
      # per-artifact size budget or slow the upload step.
      - name: Cap artifact file sizes
        if: always()
        run: |
          find /tmp/security-config -type f -size +2M -print0 2>/dev/null \
            | while IFS= read -r -d '' f; do
              echo "::warning::Truncating oversized artifact file: $f"
              tail -c 2097152 "$f" > "$f.tail" && mv "$f.tail" "$f"
            done

      - name: Upload config validator report
        id: upload_config
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-config-validate-report
          path: /tmp/security-config/
          # Success: 3-day retention keeps quota lean on green PRs.
          # Failure: 14 days so a stale PR can still be diagnosed.
          retention-days: ${{ job.status == 'success' && 3 || 14 }}
          compression-level: 9
          if-no-files-found: warn

      # Job summary — renders on the run's Summary tab with a direct
      # link to the uploaded artifact so reviewers don't have to scroll
      # the Artifacts drawer to find it.
      - name: Write job summary
        if: always()
        env:
          STATUS: ${{ job.status }}
          ARTIFACT_URL: ${{ steps.upload_config.outputs.artifact-url }}
        run: |
          {
            echo "## Supabase / Config Validate — \`$STATUS\`"
            echo ""
            if [ -n "$ARTIFACT_URL" ]; then
              echo "📎 **Artifact:** [supabase-config-validate-report]($ARTIFACT_URL)"
              echo ""
              echo "Contains \`validate.log\` (full validator stdout/stderr)."
            else
              echo "_No artifact uploaded._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  supabase_security_lint:
    name: Supabase / Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Hits the same database-lint endpoint that powers the in-editor
      # security panel and fails CI on any WARN/ERROR finding, so
      # regressions (RLS off, over-permissive policies, exposed
      # sensitive columns, unsafe SECURITY DEFINER functions, etc.)
      # block the merge instead of shipping.
      - name: Run Supabase security linter
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          # Allowlisted findings — each entry MUST have a rationale in
          # APPROVED_ALLOWLIST (scripts/supabase-security-lint.mjs) sourced
          # from @security-memory. `has_role` is a SECURITY DEFINER helper
          # called from RLS policies; signed-in EXECUTE is required for RLS
          # to evaluate it. `PRIVILEGE_ESCALATION` covers the BEFORE UPDATE
          # field-tamper triggers documented in @security-memory (they
          # reject non-admin edits to privileged columns; they never grant
          # roles). Repo-level `vars.SUPABASE_LINT_ALLOWLIST` (if set) is
          # merged in so ops can extend the list without a code change —
          # but every added name is still cross-checked against
          # APPROVED_ALLOWLIST and rejected if it lacks a recorded rationale.
          SUPABASE_LINT_ALLOWLIST: "authenticated_security_definer_function_executable,0029_authenticated_security_definer_function_executable,PRIVILEGE_ESCALATION,${{ vars.SUPABASE_LINT_ALLOWLIST }}"
        run: |
          set -o pipefail
          mkdir -p /tmp/security-lint
          bun run lint:supabase 2>&1 \
            | tee /tmp/security-lint/lint.log

      # Diff current WARN/ERROR findings against the last snapshot at
      # security/findings-snapshot.json and prepend a versioned entry
      # to security/CHANGELOG.md capturing per-`internal_id` status
      # transitions (added / removed / level changed). Runs whether
      # the lint step passed or failed so a newly-introduced finding
      # is recorded in the changelog artifact even when it also blocks
      # the merge. Soft-skips when secrets are absent (fork PRs).
      - name: Update security findings changelog
        if: always()
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SECURITY_CHANGELOG_SCAN_ID: "gha-${{ github.run_id }}-${{ github.run_attempt }}"
        run: |
          set -o pipefail
          mkdir -p /tmp/security-lint
          bun run security:changelog 2>&1 \
            | tee /tmp/security-lint/changelog.log

      - name: Snapshot baseline for artifact
        if: always()
        run: |
          mkdir -p /tmp/security-lint
          cp security/lint-baseline.json /tmp/security-lint/lint-baseline.json 2>/dev/null || true
          cp security/findings-snapshot.json /tmp/security-lint/findings-snapshot.json 2>/dev/null || true
          cp security/CHANGELOG.md /tmp/security-lint/CHANGELOG.md 2>/dev/null || true

      - name: Cap artifact file sizes
        if: always()
        run: |
          find /tmp/security-lint -type f -size +2M -print0 2>/dev/null \
            | while IFS= read -r -d '' f; do
              echo "::warning::Truncating oversized artifact file: $f"
              tail -c 2097152 "$f" > "$f.tail" && mv "$f.tail" "$f"
            done

      - name: Upload security lint report
        id: upload_lint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-security-lint-report
          path: /tmp/security-lint/
          retention-days: ${{ job.status == 'success' && 3 || 14 }}
          compression-level: 9
          if-no-files-found: warn

      - name: Write job summary
        if: always()
        env:
          STATUS: ${{ job.status }}
          ARTIFACT_URL: ${{ steps.upload_lint.outputs.artifact-url }}
        run: |
          {
            echo "## Supabase / Lint — \`$STATUS\`"
            echo ""
            if [ -n "$ARTIFACT_URL" ]; then
              echo "📎 **Artifact:** [supabase-security-lint-report]($ARTIFACT_URL)"
              echo ""
              echo "Contains \`lint.log\` (full linter output + suppression rationales) and \`lint-baseline.json\` snapshot."
            else
              echo "_No artifact uploaded._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"


  supabase_migrations:
    name: Supabase / Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # `supabase db start` boots an ephemeral Postgres + auth stack in
      # Docker and applies every file in supabase/migrations in filename
      # order. Any migration that fails to compile (bad SQL, unknown
      # column, invalid policy expression, missing GRANT, etc.) exits
      # non-zero here and fails the job before the RLS tests run.
      - name: Boot ephemeral Supabase stack
        run: supabase db start

      # Explicitly re-apply every migration against the fresh DB right
      # before the tests run. `db reset --local` drops the local DB and
      # replays supabase/migrations/*.sql from scratch, guaranteeing the
      # `supabase db test` step below always executes against a database
      # whose schema exactly matches the current migration set on the PR
      # (no drift from cached volumes, no leftover state from `db start`
      # seed data, no partially-applied migration from a previous run).
      # A failing migration here fails the job before any test runs.
      - name: Apply migrations to a fresh database
        id: db_migrate
        run: |
          set -o pipefail
          mkdir -p /tmp/db-test
          supabase db reset --local 2>&1 | tee /tmp/db-test/db-reset.log

      # Runs every supabase/tests/*.test.sql against the freshly migrated
      # DB. Currently this includes rsvps_field_tamper.test.sql which
      # asserts the check-in / waiver / entry code / ticket code fields
      # cannot be forged by attendees. A failing assertion inside a test
      # raises, `pg_prove`/`supabase db test` exits non-zero, CI fails.
      #
      # We tee both stdout and stderr (NOTICE lines land on stderr in
      # psql, which is where the PASS/FAIL messages surface) into a log
      # file so the "diagnose failure" step below can dump the full
      # transcript, and also re-run the SQL directly against the local
      # DB with -a -e for verbose output on the failing assertion.
      - name: Run database RLS + trigger tests
        id: db_test
        run: |
          set -o pipefail
          mkdir -p /tmp/db-test
          supabase db test 2>&1 | tee /tmp/db-test/db-test.log

      # Failure diagnostics ---------------------------------------------
      # Runs only when db_test failed. Prints (in order):
      #   1. Full tee'd transcript from `supabase db test`
      #   2. Verbose re-run of each *.test.sql via psql so the exact
      #      failing statement + SQLSTATE + line number is visible
      #   3. Postgres server log (contains RAISE EXCEPTION context)
      #   4. Dump of relevant policy + trigger definitions so we can
      #      tell whether the trigger/policy under test drifted
      - name: Diagnose failing db test
        if: failure() && steps.db_test.outcome == 'failure'
        run: |
          echo "===== supabase db test transcript ====="
          cat /tmp/db-test/db-test.log || echo "(no transcript captured)"

          echo ""
          echo "===== Verbose re-run of each supabase/tests/*.test.sql ====="
          DB_URL="$(supabase status -o env 2>/dev/null | awk -F= '/^DB_URL=/{gsub(/"/,"",$2); print $2}')"
          if [ -z "$DB_URL" ]; then
            echo "(could not resolve local DB_URL from \`supabase status\`)"
          else
            for f in supabase/tests/*.test.sql; do
              [ -e "$f" ] || continue
              echo ""
              echo "--- $f ---"
              # -a echoes every statement, -e echoes queries as sent,
              # -v ON_ERROR_STOP=1 exits at the first failing assertion
              # with the exact line + SQLSTATE.
              psql "$DB_URL" -v ON_ERROR_STOP=1 -a -e -f "$f" 2>&1 || true
            done
          fi

          echo ""
          echo "===== Postgres server log (last 400 lines) ====="
          supabase db logs --format pretty 2>&1 || \
            docker logs supabase_db_princesspink90 --tail 400 2>&1 || \
            echo "(no supabase logs available)"

          echo ""
          echo "===== rsvps policies & trigger definition ====="
          if [ -n "$DB_URL" ]; then
            psql "$DB_URL" -c "SELECT policyname, cmd, qual, with_check FROM pg_policies WHERE tablename='rsvps' ORDER BY cmd, policyname;" || true
            psql "$DB_URL" -c "SELECT tgname, pg_get_triggerdef(oid) FROM pg_trigger WHERE tgrelid='public.rsvps'::regclass AND NOT tgisinternal;" || true
            psql "$DB_URL" -c "SELECT pg_get_functiondef('public.rsvps_block_user_field_tamper'::regproc);" || true
          fi

      - name: Cap db-test artifact file sizes
        if: failure() && steps.db_test.outcome == 'failure'
        run: |
          find /tmp/db-test -type f -size +2M -print0 2>/dev/null \
            | while IFS= read -r -d '' f; do
              echo "::warning::Truncating oversized artifact file: $f"
              tail -c 2097152 "$f" > "$f.tail" && mv "$f.tail" "$f"
            done

      - name: Upload db test artifacts
        id: upload_db_test
        if: failure() && steps.db_test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: supabase-db-test-logs
          path: /tmp/db-test/
          # Only uploaded on failure, so always keep the longer window.
          retention-days: 14
          compression-level: 9
          if-no-files-found: warn

      # Regenerate the client TS types from the freshly migrated schema
      # and diff against the committed src/integrations/supabase/types.ts.
      # If a migration changed a table/column/enum but the committed
      # types weren't regenerated, this diff is non-empty and CI fails.
      # We also compile the regenerated file with tsc to catch any
      # TypeScript errors the generator might emit against strict mode.
      - name: Regenerate Supabase types and diff
        id: types_diff
        run: |
          set -o pipefail
          mkdir -p /tmp/types-out
          supabase gen types typescript --local \
            > /tmp/types-out/types.ts
          # Snapshot the committed file alongside so the artifact contains
          # both sides plus the unified diff — reviewers can apply
          # `types.diff` locally without re-running the CLI.
          cp src/integrations/supabase/types.ts /tmp/types-out/types.committed.ts
          # Normalize trailing whitespace / final newline to avoid noise.
          diff -u \
            <(sed -e 's/[[:space:]]*$//' /tmp/types-out/types.committed.ts) \
            <(sed -e 's/[[:space:]]*$//' /tmp/types-out/types.ts) \
            > /tmp/types-out/types.diff \
            && DIFF_RC=0 || DIFF_RC=$?
          cat /tmp/types-out/types.diff
          if [ "$DIFF_RC" -ne 0 ]; then
            echo ""
            echo "❌ Supabase generated types are out of date."
            echo "   Regenerate locally with:"
            echo "     supabase gen types typescript --local > src/integrations/supabase/types.ts"
            echo "   then commit the result. Full diff uploaded as artifact"
            echo "   'supabase-migrations-report' (types.diff)."
            exit 1
          fi

      - name: Typecheck regenerated types in isolation
        id: types_tsc
        run: |
          set -o pipefail
          # Compile the freshly generated types.ts as a standalone file
          # under the project's strict tsconfig so a schema change that
          # produces invalid TS (name collisions, reserved keywords in
          # column names, unresolvable enum refs) fails the build.
          cp /tmp/types-out/types.ts src/integrations/supabase/types.ts
          bunx --bun tsgo --noEmit \
            src/integrations/supabase/types.ts 2>&1 \
            | tee /tmp/types-out/tsgo.log

      - name: Cap migrations artifact file sizes
        if: always()
        run: |
          # types.ts is large but essential to compare — cap at 4 MiB.
          # Everything else (logs, diff) capped at 2 MiB tail.
          find /tmp/types-out -type f -size +4M -print0 2>/dev/null \
            | while IFS= read -r -d '' f; do
              echo "::warning::Truncating oversized artifact file: $f"
              tail -c 4194304 "$f" > "$f.tail" && mv "$f.tail" "$f"
            done

      - name: Upload migrations report
        id: upload_migrations
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-migrations-report
          path: /tmp/types-out/
          retention-days: ${{ job.status == 'success' && 3 || 14 }}
          compression-level: 9
          if-no-files-found: warn

      - name: Write job summary
        if: always()
        env:
          STATUS: ${{ job.status }}
          MIGRATIONS_URL: ${{ steps.upload_migrations.outputs.artifact-url }}
          DB_TEST_URL: ${{ steps.upload_db_test.outputs.artifact-url }}
          DB_TEST_OUTCOME: ${{ steps.db_test.outcome }}
          TYPES_DIFF_OUTCOME: ${{ steps.types_diff.outcome }}
          TYPES_TSC_OUTCOME: ${{ steps.types_tsc.outcome }}
        run: |
          {
            echo "## Supabase / Migrations — \`$STATUS\`"
            echo ""
            echo "| Step | Outcome |"
            echo "| --- | --- |"
            echo "| db test (RLS + triggers) | \`${DB_TEST_OUTCOME:-skipped}\` |"
            echo "| types diff | \`${TYPES_DIFF_OUTCOME:-skipped}\` |"
            echo "| types typecheck | \`${TYPES_TSC_OUTCOME:-skipped}\` |"
            echo ""
            echo "### Artifacts"
            if [ -n "$MIGRATIONS_URL" ]; then
              echo "- 📎 [supabase-migrations-report]($MIGRATIONS_URL) — \`types.ts\`, \`types.committed.ts\`, \`types.diff\`, \`tsgo.log\`"
            fi
            if [ -n "$DB_TEST_URL" ]; then
              echo "- 📎 [supabase-db-test-logs]($DB_TEST_URL) — \`db-reset.log\`, \`db-test.log\` (uploaded on db-test failure only)"
            fi
            if [ -z "$MIGRATIONS_URL" ] && [ -z "$DB_TEST_URL" ]; then
              echo "_No artifacts uploaded._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dump Supabase logs on failure
        if: failure()
        run: supabase db logs --format pretty 2>&1 || true

      - name: Tear down
        if: always()
        run: supabase stop --no-backup || true

  # -------------------------------------------------------------------
  # Aggregator job — the single required status check for branch
  # protection on `main`. Add ONLY this job's name ("Supabase Security
  # Gate") to the "Require status checks to pass before merging" list;
  # it fails if either the linter or the migrations/RLS-tests job fails
  # (including skipped/cancelled), so you don't have to keep the branch
  # protection list in sync with individual job renames.
  #
  # Kept as its own job (rather than merging the two upstream jobs into
  # one giant sequential job) so:
  #   - linter and migrations still run in parallel (faster PR feedback)
  #   - failure diagnostics stay scoped to the failing job's logs
  #   - re-runs can target just the flaky half
  # -------------------------------------------------------------------
  supabase_security_gate:
    name: Supabase / Gate (required)
    runs-on: ubuntu-latest
    needs:
      - supabase_security_config_validate
      - supabase_security_lint
      - supabase_migrations
    if: always()
    timeout-minutes: 1
    steps:
      - name: Verify all upstream security jobs succeeded
        env:
          CONFIG_RESULT: ${{ needs.supabase_security_config_validate.result }}
          LINT_RESULT: ${{ needs.supabase_security_lint.result }}
          MIGRATIONS_RESULT: ${{ needs.supabase_migrations.result }}
        run: |
          echo "supabase_security_config_validate : $CONFIG_RESULT"
          echo "supabase_security_lint            : $LINT_RESULT"
          echo "supabase_migrations               : $MIGRATIONS_RESULT"
          # `success` is the only passing outcome. `skipped`, `cancelled`,
          # and `failure` all block the merge — a skipped upstream job
          # would otherwise silently satisfy branch protection.
          if [ "$CONFIG_RESULT" != "success" ] \
             || [ "$LINT_RESULT" != "success" ] \
             || [ "$MIGRATIONS_RESULT" != "success" ]; then
            echo "::error::One or more upstream Supabase security jobs did not succeed."
            exit 1
          fi
          echo "All upstream Supabase security jobs passed."

  # Publishes the human-readable security findings summary (Markdown +
  # PDF from public/security/) as a downloadable artifact on every CI
  # run — including PRs, main, nightly cron, and workflow_dispatch — so
  # reviewers can grab the current summary straight from the run's
  # Artifacts panel without cloning the repo or hitting the public
  # /security-report route.
  security_summary_artifact:
    name: Security / Summary Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage summary files
        id: stage
        run: |
          set -euo pipefail
          mkdir -p /tmp/security-summary
          missing=0
          for f in security-findings-summary.md security-findings-summary.pdf; do
            if [ -f "public/security/$f" ]; then
              cp "public/security/$f" "/tmp/security-summary/$f"
            else
              echo "::error::Missing public/security/$f — the summary artifact requires both the Markdown and PDF."
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]
          ls -la /tmp/security-summary

      - name: Upload security findings summary
        id: upload_summary
        if: always() && steps.stage.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: security-findings-summary
          path: /tmp/security-summary/
          # Same retention shape as the other security artifacts.
          retention-days: ${{ job.status == 'success' && 14 || 30 }}
          compression-level: 9
          if-no-files-found: error

      - name: Write job summary
        if: always()
        env:
          STATUS: ${{ job.status }}
          ARTIFACT_URL: ${{ steps.upload_summary.outputs.artifact-url }}
        run: |
          {
            echo "## Security / Summary Artifact — \`$STATUS\`"
            echo ""
            if [ -n "$ARTIFACT_URL" ]; then
              echo "📎 **Artifact:** [security-findings-summary]($ARTIFACT_URL)"
              echo ""
              echo "Contains \`security-findings-summary.md\` and \`security-findings-summary.pdf\` from \`public/security/\`."
            else
              echo "_Summary files not staged — artifact not uploaded._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"






  checkout_verification:
    name: Checkout / Verify (AUD + USD)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # AUD + USD end-to-end suites: subscribe-page PriceIds, per-plan
      # Stripe session build (mode / metadata / return_url), and the
      # webhook that flips DB state. Fails on any drift in price IDs,
      # metadata keys, or `return_url` templating for either currency.
      - name: Run multi-currency checkout test suites
        run: bun run test:checkout

      # Static wiring check + optional live Stripe sandbox lookup for
      # every canonical AUD and USD PriceId. When the sandbox secrets are
      # wired, this confirms each price exists in the expected currency.
      - name: Verify checkout against Stripe sandbox
        env:
          STRIPE_SANDBOX_API_KEY: ${{ secrets.STRIPE_SANDBOX_API_KEY }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: bun run verify:checkout

  checkout_tracking_e2e:
    name: Checkout / E2E Tracking
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Playwright's bundled Chromium is downloaded to a stable path so it
      # can be cached between runs.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lockb', 'package.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Start dev server
        run: |
          bun run dev > /tmp/dev-server.log 2>&1 &
          echo $! > /tmp/dev-server.pid
          # Wait up to 60s for the server to answer on :8080. Fail loudly
          # rather than letting Playwright time out per-test.
          for i in $(seq 1 60); do
            if curl -sSf http://localhost:8080 > /dev/null 2>&1; then
              echo "dev server ready"
              exit 0
            fi
            sleep 1
          done
          echo "dev server never came up"
          cat /tmp/dev-server.log
          exit 1

      # Runs e2e/checkout-return.spec.ts: confirmed / cart-confirmed /
      # pending / cancelled / missing-session / server-error. Each test
      # asserts the exact dataLayer + app:track payload for its event.
      # A missing event or a mismatched reconciliation field fails the job.
      - name: Run checkout tracking E2E suite
        env:
          # Skip Playwright's default browser path so it picks up the
          # cached browsers under ~/.cache/ms-playwright.
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ""
        run: bun run test:e2e -- --project=chromium --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Dump dev server log on failure
        if: failure()
        run: tail -n 200 /tmp/dev-server.log || true






  # Notification gate: opens (or updates) a single tracking GitHub Issue
  # when the Supabase security lint or the static regression scan fails
  # on `main` or on the nightly scheduled run. PR runs are intentionally
  # excluded — the PR check itself already blocks the merge, no issue
  # spam needed. When the next scheduled/main run comes back green, the
  # tracking issue is auto-closed with a follow-up comment.
  #
  # `always()` so this evaluates even when an upstream job failed.
  # No third-party actions — just github-script with the repo GITHUB_TOKEN
  # (needs `issues: write`), so nothing to install and no extra secrets.
  security_notify:
    name: Security / Notify
    runs-on: ubuntu-latest
    needs: [supabase_security_lint, supabase_security_config_validate, verify]
    if: always() && (github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    permissions:
      issues: write
      contents: read
    steps:
      - name: Open or update security tracking issue
        uses: actions/github-script@v7
        env:
          LINT_RESULT: ${{ needs.supabase_security_lint.result }}
          CONFIG_RESULT: ${{ needs.supabase_security_config_validate.result }}
          VERIFY_RESULT: ${{ needs.verify.result }}
        with:
          script: |
            const TITLE = "🔒 Supabase security scan: new findings detected";
            const failed = [
              ["Supabase / Lint", process.env.LINT_RESULT],
              ["Supabase / Config Validate", process.env.CONFIG_RESULT],
              ["App / Typecheck & Test (incl. regression scan)", process.env.VERIFY_RESULT],
            ].filter(([, r]) => r === "failure");

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const trigger = context.eventName === "schedule" ? "nightly scheduled run" : `push to ${context.ref}`;

            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "security-scan",
              per_page: 5,
            });
            const existing = open.find(i => i.title === TITLE);

            if (failed.length === 0) {
              if (existing) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: existing.number,
                  body: `✅ Security scans are green again on ${trigger}. Auto-closing.\n\nRun: ${runUrl}`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: existing.number, state: "closed",
                });
                core.info(`Closed tracking issue #${existing.number}`);
              } else {
                core.info("All security scans green; nothing to notify.");
              }
              return;
            }

            const body = [
              `Security scan detected failures on **${trigger}**.`,
              ``,
              `**Failing jobs:**`,
              ...failed.map(([name]) => `- ${name}`),
              ``,
              `**Run:** ${runUrl}`,
              ``,
              `Download the \`supabase-security-lint-report\` artifact from that run for the full linter output and suppression rationales, then either fix the finding or add a reviewed rationale in \`security/lint-baseline.json\` / \`APPROVED_ALLOWLIST\`.`,
              ``,
              `_This issue is managed automatically by \`.github/workflows/ci.yml\` (\`security_notify\` job). It will be auto-closed when the next scheduled or main-branch run is green._`,
            ].join("\n");

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number, body,
              });
              core.info(`Appended finding to existing issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: TITLE, body, labels: ["security-scan"],
              });
              core.info(`Opened tracking issue #${created.data.number}`);
            }

  # Scheduled automated rescan summary. Runs on the nightly cron (and
  # on-demand via workflow_dispatch), fetches the current WARN/ERROR
  # lints, diffs them against security/lint-baseline.json AND the
  # last snapshot in security/findings-snapshot.json, and posts (or
  # updates) a single evergreen tracking issue with a concise summary:
  # counts, deltas, new IDs, and fixed IDs since the last scan.
  #
  # Unlike security_notify, this posts on EVERY scheduled run — green
  # or red — so reviewers see one canonical "state of security" issue
  # instead of hunting through workflow logs. The gating logic still
  # lives in supabase_security_lint; this job is report-only and
  # cannot fail the build on findings.
  security_scheduled_summary:
    name: Security / Scheduled Summary
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      issues: write
      contents: read
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Generate rescan summary
        id: summary
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SECURITY_SCAN_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SECURITY_SCAN_TRIGGER: ${{ github.event_name == 'schedule' && 'nightly cron' || 'manual dispatch' }}
        run: |
          mkdir -p /tmp/security-summary
          bun run security:scan-summary --out=/tmp/security-summary/rescan.md
          echo "path=/tmp/security-summary/rescan.md" >> "$GITHUB_OUTPUT"

      - name: Upload rescan summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-rescan-summary
          path: /tmp/security-summary/
          retention-days: 30
          compression-level: 9
          if-no-files-found: warn

      - name: Post rescan summary to tracking issue
        uses: actions/github-script@v7
        env:
          SUMMARY_PATH: ${{ steps.summary.outputs.path }}
        with:
          script: |
            const fs = require("node:fs");
            const TITLE = "🔒 Security rescan tracker (automated)";
            const body = fs.readFileSync(process.env.SUMMARY_PATH, "utf8");

            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "security-scan,rescan-summary",
              per_page: 10,
            });
            const existing = open.find((i) => i.title === TITLE);

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              // Keep the issue body pointing at the latest scan so a
              // reader lands on the current state without scrolling.
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `${body}\n\n---\n_Latest scheduled rescan. Comments below record earlier runs._`,
              });
              core.info(`Updated rescan tracker #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: TITLE,
                body: `${body}\n\n---\n_This issue is managed automatically by \`.github/workflows/ci.yml\` (\`security_scheduled_summary\` job) and receives a comment on every scheduled rescan._`,
                labels: ["security-scan", "rescan-summary"],
              });
              core.info(`Opened rescan tracker #${created.data.number}`);
            }





